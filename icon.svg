<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Mini Mech FPS app icon: Toy Bot head in the sunny bedroom palette.
       Full-bleed background + content inside the maskable safe zone. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe7fd"/>
      <stop offset="1" stop-color="#a8cdf0"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.22" cy="0.16" r="0.5">
      <stop offset="0" stop-color="#fff6d8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#fff6d8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffa25c"/>
      <stop offset="1" stop-color="#ef7c2e"/>
    </linearGradient>
    <linearGradient id="visor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7df0ff"/>
      <stop offset="1" stop-color="#38e6ff"/>
    </linearGradient>
  </defs>

  <!-- Background: sunny bedroom -->
  <rect width="512" height="512" fill="url(#sky)"/>
  <rect width="512" height="512" fill="url(#sun)"/>
  <rect y="404" width="512" height="108" fill="#c9a06c"/>
  <ellipse cx="256" cy="432" rx="150" ry="26" fill="#ff6b6b" opacity="0.85"/>
  <ellipse cx="256" cy="432" rx="100" ry="17" fill="#ffd93d" opacity="0.9"/>

  <!-- Confetti + foam bolt tracer -->
  <rect x="106" y="106" width="20" height="20" rx="4" fill="#4ecdc4" transform="rotate(18 116 116)"/>
  <rect x="392" y="96" width="17" height="17" rx="4" fill="#ffd166" transform="rotate(-14 400 104)"/>
  <rect x="416" y="196" width="14" height="14" rx="3" fill="#ff5db1" transform="rotate(24 423 203)"/>
  <g transform="rotate(-10 108 342)">
    <rect x="118" y="336" width="26" height="13" rx="6" fill="#9dff3a" opacity="0.35"/>
    <rect x="86" y="336" width="40" height="13" rx="6" fill="#9dff3a" opacity="0.65"/>
    <rect x="52" y="334" width="46" height="17" rx="8" fill="#9dff3a"/>
    <rect x="58" y="338" width="22" height="7" rx="3" fill="#e4ffb8"/>
  </g>

  <!-- Shadow + neck -->
  <ellipse cx="256" cy="420" rx="122" ry="20" fill="#000" opacity="0.16"/>
  <rect x="224" y="346" width="64" height="34" rx="10" fill="#50414b"/>

  <!-- Antenna + beacon -->
  <rect x="249" y="94" width="14" height="52" rx="6" fill="#50414b"/>
  <circle cx="256" cy="86" r="30" fill="#ff5db1" opacity="0.25"/>
  <circle cx="256" cy="86" r="17" fill="#ff5db1"/>
  <circle cx="250" cy="80" r="5" fill="#ffc4e2"/>

  <!-- Ear pods -->
  <rect x="94" y="208" width="36" height="94" rx="13" fill="#50414b"/>
  <rect x="382" y="208" width="36" height="94" rx="13" fill="#50414b"/>
  <circle cx="112" cy="255" r="9" fill="#ffd166"/>
  <circle cx="400" cy="255" r="9" fill="#ffd166"/>

  <!-- Head -->
  <rect x="126" y="138" width="260" height="224" rx="44" fill="url(#head)"/>
  <rect x="126" y="138" width="260" height="224" rx="44" fill="none" stroke="#b3541e" stroke-width="6" opacity="0.35"/>
  <rect x="150" y="152" width="150" height="26" rx="13" fill="#fff" opacity="0.28"/>

  <!-- Visor -->
  <rect x="154" y="208" width="204" height="70" rx="22" fill="#24313f"/>
  <rect x="168" y="222" width="176" height="42" rx="16" fill="url(#visor)"/>
  <rect x="180" y="229" width="54" height="13" rx="6" fill="#fff" opacity="0.55"/>

  <!-- Mouth vents -->
  <rect x="210" y="304" width="24" height="16" rx="5" fill="#c9611f"/>
  <rect x="244" y="304" width="24" height="16" rx="5" fill="#c9611f"/>
  <rect x="278" y="304" width="24" height="16" rx="5" fill="#c9611f"/>
</svg>
